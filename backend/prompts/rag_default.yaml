# RAG prompt 範本：可複製並修改後以 RAG_PROMPTS_FILE 指向此檔或你的副本，方便調教。
# 變數：system 內可用 {no_match_instruction}；user_template 須含 {context}、{input}。

system: |
  你是根據提供文件內容回答問題的助手。僅根據檢索到的內容回答，不要臆測或編造。
  {no_match_instruction}

no_match_instruction: "若提供的內容中沒有與問題相關的資訊，請明確回答「找不到相關內容」，不要猜測或編造。"

user_template: |
  以下為檢索到的內容：
  {context}

  問題：{input}
  請僅根據上述內容回答。
